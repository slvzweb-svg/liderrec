<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ultra | Nobre RP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #050505;
            --bg-glass: rgba(18, 18, 18, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --accent: #ff3c3c;
            --accent-gold: #ffb400;
            --success: #2ecc71;
            --danger: #e74c3c;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            padding-top: 70px;
        }

        /* === EFEITO DE BORBOLETAS / PARTÍCULAS (BG) === */
        .background-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* === HEADER ESTILO DISCORD === */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000;
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; color: #fff; }
        .brand span { color: var(--accent); }

        .btn-logout {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--accent); border-color: var(--accent); }

        /* === DASHBOARD CONTROLS === */
        .dashboard-header {
            padding: 20px; max-width: 1200px; margin: 0 auto;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-glass); color: var(--text-dim); font-weight: 600;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 60, 60, 0.3); }

        .search-area {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .search-box {
            flex: 2; background: var(--bg-glass); border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: #fff; outline: none; backdrop-filter: blur(10px);
        }

        /* === CARDS ESTILO VIDRO === */
        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding: 0 20px 40px; max-width: 1200px; margin: 0 auto;
        }

        .candidato-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .candidato-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-badge {
            position: absolute; top: 15px; right: 15px;
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .status-pendente { background: rgba(255, 180, 0, 0.15); color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .status-aprovado { background: rgba(46, 204, 113, 0.15); color: var(--success); border: 1px solid var(--success); }
        .status-reprovado { background: rgba(231, 76, 60, 0.15); color: var(--danger); border: 1px solid var(--danger); }

        .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .card-discord { color: var(--accent-gold); font-size: 0.9rem; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }

        .btn-open {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .btn-open:hover { background: #fff; color: #000; }

        /* === MODAL ULTRA === */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111; border: 1px solid var(--border); width: 100%; max-width: 700px;
            max-height: 85vh; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .qa-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        .qa-box label { color: var(--accent-gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        .modal-footer { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: #0a0a0a; }
        .btn-approve { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--success); color: #fff; font-weight: 700; cursor: pointer; }
        .btn-reject { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--danger); color: #fff; font-weight: 700; cursor: pointer; }

        /* TOASTS */
        #toastBox { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: #111; border-left: 4px solid var(--accent); color: #fff; padding: 15px 25px; border-radius: 4px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div class="background-animate" id="particles"></div>

    <header>
        <div class="brand">NOBRE<span>RP</span></div>
        <button class="btn-logout" id="btnLogout"><i class="fa-solid fa-power-off"></i> Sair</button>
    </header>

    <div class="dashboard-header">
        <div class="tabs">
            <button class="tab-btn active" onclick="carregarAba('suporte', event)">SUPORTE</button>
            <button class="tab-btn" onclick="carregarAba('lideranca', event)">LIDERANÇA</button>
        </div>
        <div class="search-area">
            <input type="text" id="searchInput" class="search-box" placeholder="Filtrar por nome ou discord..." oninput="filtrar()">
        </div>
    </div>

    <div class="container" id="listaCandidatos">
        </div>

    <div class="modal" id="modalDetalhes">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalhes</h3>
                <button onclick="fecharModal()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-approve" id="btnApproveAction">APROVAR</button>
                <button class="btn-reject" id="btnRejectAction">REPROVAR</button>
            </div>
        </div>
    </div>

    <div id="toastBox"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVQFewEN1mQDe0pnIEVU_H98l5JCeciI",
            authDomain: "site-f55e1.firebaseapp.com",
            projectId: "site-f55e1",
            storageBucket: "site-f55e1.firebasestorage.app",
            messagingSenderId: "800441189890",
            appId: "1:800441189890:web:27f8911aa47964665f091b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let abaAtual = 'suporte';
        let dadosLocais = [];

        // Criar Partículas (Efeito Borboleta)
        function initParticles() {
            const container = document.getElementById('particles');
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 10 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        initParticles();

        onAuthStateChanged(auth, user => {
            if(!user) window.location.href = 'index.html';
            else carregarAba('suporte');
        });

        document.getElementById('btnLogout').onclick = () => signOut(auth);

        window.carregarAba = async (aba, e) => {
            abaAtual = aba;
            if(e) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            }

            const container = document.getElementById('listaCandidatos');
            container.innerHTML = '<p>Buscando...</p>';

            const colecao = aba === 'suporte' ? 'candidatos_suporte' : 'candidatos_lideranca';
            const snap = await getDocs(collection(db, colecao));
            dadosLocais = [];

            container.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                data.status = data.status || 'pendente';
                dadosLocais.push(data);
                renderCard(data);
            });
        };

        function renderCard(data) {
            const container = document.getElementById('listaCandidatos');
            const nome = abaAtual === 'suporte' ? (data.basico?.nome || 'Candidato') : 'Liderança';
            const discord = abaAtual === 'suporte' ? (data.basico?.discord || '@discord') : (data.discord || '@discord');
            
            const card = document.createElement('div');
            card.className = 'candidato-card';
            card.innerHTML = `
                <span class="status-badge status-${data.status}">${data.status}</span>
                <div class="card-name">${nome}</div>
                <div class="card-discord"><i class="fa-brands fa-discord"></i> ${discord}</div>
                <button class="btn-open" onclick="abrirModal('${data.id}')">AVALIAR FICHA</button>
            `;
            container.appendChild(card);
        }

        window.abrirModal = (id) => {
            const item = dadosLocais.find(d => d.id === id);
            const body = document.getElementById('modalBody');
            body.innerHTML = '';
            
            document.getElementById('modalTitle').innerText = "Ficha de Candidato";
            
            // Renderizar perguntas dinamicamente
            if(abaAtual === 'suporte') {
                Object.entries(item).forEach(([key, val]) => {
                    if(typeof val === 'object' && key !== 'id') {
                        Object.entries(val).forEach(([pergunta, resposta]) => {
                            body.innerHTML += `<div class="qa-box"><label>${pergunta.replace(/_/g,' ')}</label><p>${resposta}</p></div>`;
                        });
                    }
                });
            } else {
                if(item.respostas) {
                    Object.entries(item.respostas).forEach(([q, a]) => {
                        body.innerHTML += `<div class="qa-box"><label>${q}</label><p>${a}</p></div>`;
                    });
                }
            }

            document.getElementById('btnApproveAction').onclick = () => atualizarStatus(id, 'aprovado');
            document.getElementById('btnRejectAction').onclick = () => atualizarStatus(id, 'reprovado');
            
            document.getElementById('modalDetalhes').classList.add('active');
        };

        window.fecharModal = () => document.getElementById('modalDetalhes').classList.remove('active');

        async function atualizarStatus(id, status) {
            const colecao = abaAtual === 'suporte' ? 'candidatos_suporte' : 'candidatos_lideranca';
            await updateDoc(doc(db, colecao, id), { status });
            toast(`Candidato ${status}!`);
            fecharModal();
            carregarAba(abaAtual);
        }

        function toast(msg) {
            const b = document.getElementById('toastBox');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            b.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        window.filtrar = () => {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('listaCandidatos');
            container.innerHTML = '';
            dadosLocais.forEach(d => {
                const str = JSON.stringify(d).toLowerCase();
                if(str.includes(termo)) renderCard(d);
            });
        };
    </script>
</body>
</html>
