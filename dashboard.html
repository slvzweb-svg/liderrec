<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Advanced | Nobre RP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === VARIÁVEIS BASE === */
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(18, 18, 18, 0.6);
            --bg-card: rgba(26, 26, 26, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #9e9e9e;
            --accent: #d32f2f;
            --accent-gold: #c5a059;
            --success: #2e7d32;
            --danger: #c62828;
            --radius: 12px;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-base);
            color: var(--text-main);
            padding-top: 70px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === EFEITO BACKGROUND ANIMADO (ESTILO DISCORD) === */
        #bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 100%);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(211, 47, 47, 0.15);
            filter: blur(20px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* === HEADER === */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
        }

        .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .btn-logout {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-main);
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: var(--transition);
        }
        .btn-logout:hover { background: var(--accent); border-color: var(--accent); }

        /* === DASHBOARD CONTROLS === */
        .dashboard-header {
            position: sticky; top: 60px; z-index: 90;
            background: rgba(5, 5, 5, 0.5); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding-bottom: 10px;
        }

        .tabs { display: flex; gap: 12px; padding: 20px 20px 10px; overflow-x: auto; }
        .tab-btn {
            flex: 1; min-width: 150px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-surface); color: var(--text-dim); font-weight: 600; 
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 20px rgba(211, 47, 47, 0.3); }

        .controls { display: flex; gap: 12px; padding: 0 20px 10px; flex-wrap: wrap; }
        .search-box, .filter-box {
            background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
            color: #fff; padding: 12px; outline: none; transition: var(--transition);
        }
        .search-box:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .search-box { flex: 2; min-width: 250px; }
        .filter-box { flex: 1; min-width: 150px; }

        /* === CANDIDATOS CARDS === */
        .container { padding: 20px; display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        
        .candidato-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; backdrop-filter: blur(10px); transition: var(--transition);
            display: flex; flex-direction: column; gap: 15px; position: relative;
        }
        .candidato-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); background: rgba(35, 35, 35, 0.6); }

        .candidato-nome { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .candidato-discord { color: var(--accent-gold); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        
        .badge-status { font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; font-weight: 700; text-transform: uppercase; }
        .status-pendente { background: rgba(255, 152, 0, 0.15); color: #ff9800; border: 1px solid #ff9800; }
        .status-aprovado { background: rgba(76, 175, 80, 0.15); color: #4caf50; border: 1px solid #4caf50; }
        .status-reprovado { background: rgba(244, 67, 54, 0.15); color: #f44336; border: 1px solid #f44336; }

        .btn-view {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff;
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: var(--transition);
        }
        .btn-view:hover { background: #fff; color: #000; }

        /* === MODAL ESTILO OVERLAY === */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; }

        .modal-content {
            background: #111; border: 1px solid var(--border); width: 100%; max-width: 800px;
            max-height: 90vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .qa-block { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 3px solid var(--accent-gold); }
        .qa-pergunta { color: var(--accent-gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .qa-resposta { line-height: 1.6; font-size: 0.95rem; }

        .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #fff; }

        /* === TOASTS === */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
        .toast { background: #1a1a1a; border: 1px solid var(--border); padding: 15px 25px; border-radius: 8px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div id="bg-animation"></div>

    <header>
        <div class="brand"><i class="fa-solid fa-fire-realtor"></i> NOBRE RP STAFF</div>
        <button class="btn-logout" id="btnLogout">Sair do Painel</button>
    </header>

    <div class="dashboard-header">
        <div class="tabs">
            <button class="tab-btn active" onclick="carregarAba('suporte', event)"><i class="fa-solid fa-headset"></i> Suporte</button>
            <button class="tab-btn" onclick="carregarAba('lideranca', event)"><i class="fa-solid fa-crown"></i> Liderança</button>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Filtrar por nome ou discord..." oninput="filtrarCards()">
            <select id="statusFilter" class="filter-box" onchange="filtrarCards()">
                <option value="todos">Todos Status</option>
                <option value="pendente">Pendentes</option>
                <option value="aprovado">Aprovados</option>
                <option value="reprovado">Reprovados</option>
            </select>
        </div>
    </div>

    <div class="container" id="listaCandidatos"></div>

    <div class="modal" id="modalDetalhes">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ficha de Candidato</h2>
                <button onclick="fecharModal()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVQFewEN1mQDe0pnIEVU_H98l5JCeciI",
            authDomain: "site-f55e1.firebaseapp.com",
            projectId: "site-f55e1",
            storageBucket: "site-f55e1.firebasestorage.app",
            messagingSenderId: "800441189890",
            appId: "1:800441189890:web:27f8911aa47964665f091b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let abaAtual = 'suporte';
        let dadosAtuais = [];

        // GERAR EFEITO DE PARTÍCULAS
        function createParticles() {
            const container = document.getElementById('bg-animation');
            for(let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 100 + 50 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = Math.random() * 10 + 15 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // AUTH
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
            else carregarAba('suporte');
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        // CARREGAR DADOS
        window.carregarAba = async function(aba, event) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');

            const container = document.getElementById('listaCandidatos');
            container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:50px; opacity:0.5;">Carregando banco de dados...</p>';

            const colName = aba === 'suporte' ? 'candidatos_suporte' : 'candidatos_lideranca';
            
            try {
                const snap = await getDocs(collection(db, colName));
                dadosAtuais = [];
                snap.forEach(d => dadosAtuais.push({id: d.id, ...d.data()}));
                
                // Ordenação por data
                dadosAtuais.sort((a,b) => (b.data_inscricao?.seconds || 0) - (a.data_inscricao?.seconds || 0));
                
                renderizarCards(dadosAtuais);
            } catch (e) {
                container.innerHTML = `<p style="color:red; grid-column:1/-1; text-align:center;">Erro: ${e.message}</p>`;
            }
        };

        function renderizarCards(lista) {
            const container = document.getElementById('listaCandidatos');
            container.innerHTML = '';

            lista.forEach(item => {
                const discord = abaAtual === 'suporte' ? (item.basico?.discord || 'Indefinido') : (item.discord || 'Indefinido');
                const nome = abaAtual === 'suporte' ? (item.basico?.nome || 'Candidato') : 'Liderança';
                const status = item.status || 'pendente';

                const card = document.createElement('div');
                card.className = 'candidato-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div class="candidato-nome">${nome}</div>
                            <div class="candidato-discord"><i class="fa-brands fa-discord"></i> ${discord}</div>
                        </div>
                        <span class="badge-status status-${status}">${status}</span>
                    </div>
                    <button class="btn-view" onclick="abrirModal('${item.id}')">Analisar Perfil</button>
                `;
                container.appendChild(card);
            });
        }

        window.filtrarCards = function() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtrados = dadosAtuais.filter(i => {
                const d = (abaAtual === 'suporte' ? i.basico?.discord : i.discord) || '';
                const n = (abaAtual === 'suporte' ? i.basico?.nome : '') || '';
                const mTexto = d.toLowerCase().includes(termo) || n.toLowerCase().includes(termo);
                const mStatus = status === 'todos' || (i.status || 'pendente') === status;
                return mTexto && mStatus;
            });
            renderizarCards(filtrados);
        };

        window.abrirModal = function(id) {
            const item = dadosAtuais.find(i => i.id === id);
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = '';

            if(abaAtual === 'suporte') {
                const secoes = ['basico', 'perfil', 'pratica', 'disponibilidade', 'tecnico', 'psicologico'];
                secoes.forEach(sec => {
                    if(item[sec]) {
                        modalBody.innerHTML += `<h3 style="margin:15px 0 10px; color:#fff; font-size:0.9rem;">${sec.toUpperCase()}</h3>`;
                        for(let [q, a] of Object.entries(item[sec])) {
                            modalBody.innerHTML += `<div class="qa-block"><div class="qa-pergunta">${q}</div><div class="qa-resposta">${a}</div></div>`;
                        }
                    }
                });
            } else if(item.respostas) {
                Object.entries(item.respostas).forEach(([q, a]) => {
                    modalBody.innerHTML += `<div class="qa-block"><div class="qa-pergunta">${q}</div><div class="qa-resposta">${a}</div></div>`;
                });
            }

            document.getElementById('modalFooter').innerHTML = `
                <button class="btn-action" style="background:#2e7d32" onclick="decidir('${id}', 'aprovado')">Aprovar</button>
                <button class="btn-action" style="background:#c62828" onclick="decidir('${id}', 'reprovado')">Reprovar</button>
            `;

            document.getElementById('modalDetalhes').classList.add('active');
        };

        window.fecharModal = () => document.getElementById('modalDetalhes').classList.remove('active');

        window.decidir = async function(id, status) {
            const col = abaAtual === 'suporte' ? 'candidatos_suporte' : 'candidatos_lideranca';
            try {
                await updateDoc(doc(db, col, id), { status: status });
                const idx = dadosAtuais.findIndex(i => i.id === id);
                dadosAtuais[idx].status = status;
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color:#4caf50"></i> Candidato ${status}!`;
                document.getElementById('toast-container').appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
                
                fecharModal();
                renderizarCards(dadosAtuais);
            } catch (e) { alert("Erro ao atualizar: " + e.message); }
        };

    </script>
</body>
</html>
