<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobre RP | Recrutamento de Liderança</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #121212;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #9e9e9e;
            --text-muted: #666666;
            --accent-red: #d32f2f;
            --accent-red-hover: #b71c1c;
            --accent-gold: #c5a059;
            --input-bg: #0a0a0a;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.8);
            --shadow-red: 0 4px 20px rgba(211, 47, 47, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            background-image: radial-gradient(circle at 15% 50%, rgba(211, 47, 47, 0.03), transparent 25%);
            overflow-x: hidden;
        }

        /* === HEADER === */
        header {
            position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; text-transform: uppercase; }
        .brand i { color: var(--accent-red); font-size: 1.5rem; }

        .btn-header-login {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);
            padding: 0.5rem 1.25rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px;
        }
        .btn-header-login:hover { border-color: var(--text-primary); color: var(--text-primary); background: var(--bg-surface); }

        /* === GERAL === */
        .wrapper { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }

        .form-header { text-align: center; margin-bottom: 40px; }
        .form-header h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 10px; }
        .form-header p { color: var(--accent-gold); font-weight: 500; }

        .section-card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 30px; margin-bottom: 25px;
            animation: fadeUp 0.6s ease-out backwards;
        }

        .section-title {
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px;
            padding-bottom: 15px; border-bottom: 1px solid var(--border-color);
        }
        .section-title i { color: var(--accent-red); }
        .section-title h2 { font-size: 1.1rem; text-transform: uppercase; color: var(--text-primary); }

        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 10px; font-size: 0.95rem; color: var(--text-secondary); line-height: 1.4; }
        .required { color: var(--accent-red); margin-left: 4px; }

        input, textarea, select {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border-color);
            color: #fff; padding: 14px; border-radius: 6px; outline: none; transition: var(--transition);
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-red); background: #000; }
        textarea { min-height: 110px; resize: vertical; }

        .btn-submit {
            width: 100%; background: var(--accent-red); color: #fff; border: none;
            padding: 20px; font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
            border-radius: 6px; cursor: pointer; transition: var(--transition);
            box-shadow: var(--shadow-red); display: flex; justify-content: center; gap: 12px;
        }
        .btn-submit:hover { transform: translateY(-3px); background: var(--accent-red-hover); box-shadow: 0 6px 25px rgba(211, 47, 47, 0.4); }
        .btn-submit:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        /* === MODAL === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            width: 90%; max-width: 400px; border-radius: 8px; display: flex; flex-direction: column;
            transform: scale(0.98) translateY(10px); transition: var(--transition); box-shadow: var(--shadow-md);
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.1rem; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
        .modal-header h3 i { color: var(--accent-red); }
        .btn-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: var(--transition); }
        .btn-close:hover { color: var(--accent-red); }
        .modal-body { padding: 24px; color: var(--text-secondary); }
        
        .btn-login-action {
            width: 100%; background: var(--text-primary); color: var(--bg-base); border: none;
            padding: 12px; border-radius: 4px; font-weight: 600; margin-top: 16px; cursor: pointer; transition: var(--transition);
        }
        .btn-login-action:hover { background: var(--text-secondary); }

        /* === TOASTS === */
        .toast-wrapper { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 16px 20px; border-radius: 6px; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
        }
        .toast::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .toast.success::before { background: #4caf50; }
        .toast.error::before { background: var(--accent-red); }
        .toast.show { transform: translateX(0); }
        .toast i { font-size: 1.2rem; }
        .toast.success i { color: #4caf50; }
        .toast.error i { color: var(--accent-red); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="brand"><i class="fa-solid fa-crown"></i><span>Nobre RP Liderança</span></div>
        <button class="btn-header-login" onclick="toggleModal('modalLogin')">
            <i class="fa-solid fa-lock"></i> Admin
        </button>
    </header>

    <div class="wrapper">
        <div class="form-header">
            <h1>Entrevista para Líder</h1>
            <p>Seja direto, honesto e demonstre sua maturidade estratégica.</p>
        </div>

        <form id="formLideranca">
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-user"></i><h2>1. Dados Pessoais</h2></div>
                <div class="form-group">
                    <label>1. Nome completo, idade e há quanto tempo joga RP? <span class="required">*</span></label>
                    <textarea id="q1" required placeholder="Ex: João Silva, 25 anos, jogo há 4 anos."></textarea>
                </div>
                <div class="form-group">
                    <label>2. Já foi staff/líder? Onde e por quanto tempo? Por que saiu? <span class="required">*</span></label>
                    <textarea id="q2" required placeholder="Liste suas experiências anteriores..."></textarea>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-masks-theater"></i><h2>2. Experiência com RP</h2></div>
                <div class="form-group">
                    <label>3. O que é RP pra você em apenas 1 frase? <span class="required">*</span></label>
                    <input type="text" id="q3" required>
                </div>
                <div class="form-group">
                    <label>4. Me dê 3 exemplos de Anti-RP que você não tolera no servidor. <span class="required">*</span></label>
                    <textarea id="q4" required placeholder="Ex: VDM, Powergaming..."></textarea>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-eye"></i><h2>3. Visão de Liderança</h2></div>
                <div class="form-group">
                    <label>5. Pra você, qual a função principal de um Líder de servidor? <span class="required">*</span></label>
                    <textarea id="q5" required></textarea>
                </div>
                <div class="form-group">
                    <label>6. Como você lida com staff que abusa do poder? <span class="required">*</span></label>
                    <textarea id="q6" required></textarea>
                </div>
                <div class="form-group">
                    <label>7. Prefere ser temido ou respeitado? Por quê? <span class="required">*</span></label>
                    <textarea id="q7" required></textarea>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-screwdriver-wrench"></i><h2>4. Situações Práticas</h2></div>
                <div class="form-group"><label>8. Seu ADM mais antigo favorece a namorada no jogo. O que você faz? <span class="required">*</span></label><textarea id="q8" required></textarea></div>
                <div class="form-group"><label>9. Duas facções querem guerra fora do horário ("cidade morta"). Você libera? <span class="required">*</span></label><textarea id="q9" required></textarea></div>
                <div class="form-group"><label>10. Um streamer famoso quer entrar sem seguir regras de criação. E agora? <span class="required">*</span></label><textarea id="q10" required></textarea></div>
                <div class="form-group"><label>11. O servidor caiu 40% de players em 1 mês. Qual seu primeiro passo? <span class="required">*</span></label><textarea id="q11" required></textarea></div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-chart-line"></i><h2>5. Regras e Desenvolvimento</h2></div>
                <div class="form-group"><label>12. Você mudaria alguma regra atual do servidor? Qual e por quê? <span class="required">*</span></label><textarea id="q12" required></textarea></div>
                <div class="form-group"><label>13. Como você traz player novo e mantém os antigos ativos? <span class="required">*</span></label><textarea id="q13" required></textarea></div>
                <div class="form-group"><label>14. Qual sua meta em 30 dias como líder? <span class="required">*</span></label><textarea id="q14" required></textarea></div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-handshake-angle"></i><h2>6. Postura e Ética</h2></div>
                <div class="form-group"><label>15. Alguém te xinga no Discord. Você responde como líder ou como player? <span class="required">*</span></label><textarea id="q15" required></textarea></div>
                <div class="form-group"><label>16. Você descobre outro líder vendendo item por fora. O que faz? <span class="required">*</span></label><textarea id="q16" required></textarea></div>
                <div class="form-group">
                    <label>17. Está disposto a ouvir “não” da equipe e voltar atrás numa decisão? <span class="required">*</span></label>
                    <select id="q17" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="Sim">Sim, priorizo o bem do servidor</option>
                        <option value="Não">Não, o líder deve manter a palavra final</option>
                    </select>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-flag-checkered"></i><h2>7. Fechamento</h2></div>
                <div class="form-group"><label>18. Por que você quer ser líder aqui e não em outro servidor? <span class="required">*</span></label><textarea id="q18" required></textarea></div>
                <div class="form-group"><label>19. Se perguntarmos aos seus antigos players, o que eles diriam sobre você? <span class="required">*</span></label><textarea id="q19" required></textarea></div>
                <div class="form-group"><label>20. Qual seu ponto fraco como líder? <span class="required">*</span></label><textarea id="q20" required></textarea></div>
                
                <div class="form-group">
                    <label>Seu ID no Discord para contato: <span class="required">*</span></label>
                    <input type="text" id="discord_id" required placeholder="Ex: seunickname">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <span>Enviar Candidatura de Líder</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <div class="modal-overlay modal-login" id="modalLogin">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-terminal"></i> Acesso Restrito</h3>
                <button class="btn-close" onclick="toggleModal('modalLogin')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>E-mail Corporativo</label>
                    <input type="email" id="loginEmail" placeholder="admin@nobrerp.com">
                </div>
                <div class="form-group">
                    <label>Senha de Acesso</label>
                    <input type="password" id="loginPass" placeholder="••••••••">
                </div>
                <button class="btn-login-action" onclick="executarLogin()">Conectar ao Painel</button>
            </div>
        </div>
    </div>

    <div class="toast-wrapper" id="toastBox"></div>

    <script type="module">
        // Importações do Firebase incluindo o Auth
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVQFewEN1mQDe0pnIEVU_H98l5JCeciI",
            authDomain: "site-f55e1.firebaseapp.com",
            projectId: "site-f55e1",
            storageBucket: "site-f55e1.firebasestorage.app",
            messagingSenderId: "800441189890",
            appId: "1:800441189890:web:27f8911aa47964665f091b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // Inicializa a autenticação

        // Função de Toasts com Sucesso/Erro
        window.emitirToast = function(mensagem, tipo = 'success') {
            const caixa = document.getElementById('toastBox');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            
            const icone = tipo === 'success' 
                ? '<i class="fa-solid fa-check"></i>' 
                : '<i class="fa-solid fa-triangle-exclamation"></i>';
                
            toast.innerHTML = `${icone} <span>${mensagem}</span>`;
            caixa.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => { 
                toast.classList.remove('show'); 
                setTimeout(() => toast.remove(), 400); 
            }, 4000);
        }

        // Função para abrir/fechar Modais
        window.toggleModal = function(id) {
            const modal = document.getElementById(id);
            if(modal.classList.contains('active')) {
                modal.classList.remove('active');
            } else {
                modal.classList.add('active');
            }
        }

        // Fechar modal ao clicar fora dele
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if(e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // Envio do Formulário para a coleção "candidatos_lideranca"
        document.getElementById('formLideranca').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processando...';

            const dados = {
                tipo: "LIDERANÇA",
                data: serverTimestamp(),
                discord: document.getElementById('discord_id').value,
                respostas: {}
            };

            for(let i=1; i<=20; i++) {
                dados.respostas[`pergunta_${i}`] = document.getElementById(`q${i}`).value;
            }

            try {
                await addDoc(collection(db, "candidatos_lideranca"), dados);
                emitirToast("Candidatura enviada! Boa sorte.", "success");
                document.getElementById('formLideranca').reset();
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (err) {
                emitirToast("Erro ao enviar. Tente novamente.", "error");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Enviar Candidatura de Líder</span> <i class="fa-solid fa-paper-plane"></i>';
            }
        });

        // Função de Login do Admin
        window.executarLogin = function() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            if(!email || !pass) {
                emitirToast("Preencha todos os campos.", "error");
                return;
            }

            signInWithEmailAndPassword(auth, email, pass)
                .then((userCred) => {
                    emitirToast("Acesso autorizado. Redirecionando...", "success");
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                })
                .catch((error) => {
                    emitirToast("Credenciais inválidas.", "error");
                    console.error("Erro no login: ", error.message);
                });
        }
    </script>
</body>
</html>
